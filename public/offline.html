<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuxuryStay — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; background: #fff; color: #171717; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; text-align: center; }
    .container { max-width: 360px; }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 24px; font-weight: 600; margin-bottom: 12px; }
    p { font-size: 16px; color: #737373; line-height: 1.5; margin-bottom: 24px; }
    button { background: #171717; color: #fff; border: none; padding: 12px 32px; border-radius: 12px; font-size: 16px; font-weight: 500; cursor: pointer; }
    button:active { background: #404040; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#127968;</div>
    <h1>Sei offline</h1>
    <p>Controlla la connessione internet e riprova per esplorare le ville di lusso su LuxuryStay.</p>
    <button onclick="window.location.reload()">Riprova</button>
  </div>
</body>
</html>
